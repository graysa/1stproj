<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Care Groups{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'attendance/css/style.css' %}">
</head>
<body>
  <header class="app-header">
    {% block header %}
    <span class="app-title">Care Groups</span>
    {% endblock %}
  </header>
  <main class="app-main">
    {% if messages %}
      {% for message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  {% block tab_bar %}
  <nav class="tab-bar">
    <a href="{% url 'meeting_list' %}" class="tab-item {% block tab_meetings %}{% endblock %}">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      Meetings
    </a>
    <a href="{% url 'analytics' %}" class="tab-item {% block tab_analytics %}{% endblock %}">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      Analytics
    </a>
    <a href="{% url 'members_list' %}" class="tab-item {% block tab_members %}{% endblock %}">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </span>
      Members
    </a>
  </nav>
  {% endblock %}
</body>
</html>
